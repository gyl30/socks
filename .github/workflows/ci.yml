name: Build Binaries

on:
  push:
    branches:
      - main
      - dev
  pull_request:
  workflow_dispatch:

env:
  BOOST_VERSION: "1.89.0"
  BOOST_ARCHIVE: "boost_1_89_0.tar.bz2"
  BOOST_SRC_DIR: "boost_1_89_0"
  OPENSSL_VERSION: "3.6.0"
  OPENSSL_ARCHIVE: "openssl-3.6.0.tar.gz"
  OPENSSL_SRC_DIR: "openssl-3.6.0"

jobs:
  build-linux-matrix:
    name: Build Linux (${{ matrix.arch }},${{ matrix.compiler }},${{ matrix.libc }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        arch: [x86, arm64]
        compiler: [gcc, clang]
        libc: [glibc, musl]
        include:
          - arch: x86
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore Linux Boost Cache
        uses: actions/cache@v4
        with:
          path: .cache/boost
          key: linux-boost-${{ env.BOOST_VERSION }}

      - name: Restore Linux OpenSSL Cache
        uses: actions/cache@v4
        with:
          path: .cache/openssl/${{ matrix.libc }}-${{ matrix.arch }}
          key: linux-${{ matrix.arch }}-${{ matrix.libc }}-openssl-${{ env.OPENSSL_VERSION }}-${{ hashFiles('script/install_openssl_from_source.sh') }}
          restore-keys: |
            linux-${{ matrix.arch }}-${{ matrix.libc }}-openssl-${{ env.OPENSSL_VERSION }}-

      - name: Build Linux glibc Matrix Target
        if: ${{ matrix.libc == 'glibc' }}
        run: |
          set -euo pipefail
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e BOOST_VERSION \
            -e BOOST_ARCHIVE \
            -e BOOST_SRC_DIR \
            -e OPENSSL_VERSION \
            -e OPENSSL_ARCHIVE \
            -e OPENSSL_SRC_DIR \
            -e COMPILER="${{ matrix.compiler }}" \
            ubuntu:24.04 bash -lc '
              set -euo pipefail
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y --no-install-recommends \
                ca-certificates \
                bzip2 \
                tar \
                wget \
                perl \
                make \
                cmake \
                ninja-build \
                pkg-config \
                gcc \
                g++ \
                clang

              mkdir -p /workspace/.cache/boost
              if [ ! -d "/workspace/.cache/boost/${BOOST_SRC_DIR}" ]; then
                wget -O "/workspace/.cache/boost/${BOOST_ARCHIVE}" "https://archives.boost.io/release/${BOOST_VERSION}/source/${BOOST_ARCHIVE}"
                tar xf "/workspace/.cache/boost/${BOOST_ARCHIVE}" -C /workspace/.cache/boost
              fi

              if [ "${COMPILER}" = "gcc" ]; then
                CC_BIN=gcc
                CXX_BIN=g++
              else
                CC_BIN=clang
                CXX_BIN=clang++
              fi

              BOOST_ROOT="/workspace/.cache/boost/${BOOST_SRC_DIR}"
              OPENSSL_CACHE_ROOT="/workspace/.cache/openssl/${{ matrix.libc }}-${{ matrix.arch }}"
              OPENSSL_ROOT="${OPENSSL_CACHE_ROOT}/install-${OPENSSL_VERSION}"

              OPENSSL_INSTALL_DIR="${OPENSSL_ROOT}" \
              OPENSSL_CACHE_DIR="${OPENSSL_CACHE_ROOT}" \
              bash ./script/install_openssl_from_source.sh

              cmake -S . -B build -GNinja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_C_COMPILER="${CC_BIN}" \
                -DCMAKE_CXX_COMPILER="${CXX_BIN}" \
                -DENABLE_TSAN=OFF \
                -DENABLE_ASAN=OFF \
                -DBoost_NO_BOOST_CMAKE=ON \
                -DBoost_NO_SYSTEM_PATHS=ON \
                -DBOOST_ROOT="${BOOST_ROOT}" \
                -DOPENSSL_ROOT_DIR="${OPENSSL_ROOT}" \
                -DCMAKE_PREFIX_PATH="${BOOST_ROOT};${OPENSSL_ROOT}"

              cmake --build build --target socks --parallel
              grep -q "SOCKS_HAS_TPROXY=1" build/compile_commands.json
            '

      - name: Build Linux musl Matrix Target
        if: ${{ matrix.libc == 'musl' }}
        run: |
          set -euo pipefail
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e BOOST_VERSION \
            -e BOOST_ARCHIVE \
            -e BOOST_SRC_DIR \
            -e OPENSSL_VERSION \
            -e OPENSSL_ARCHIVE \
            -e OPENSSL_SRC_DIR \
            -e COMPILER="${{ matrix.compiler }}" \
            alpine:3.20 sh -lc '
              set -eu
              apk add --no-cache \
                bash \
                ca-certificates \
                bzip2 \
                tar \
                wget \
                perl \
                cmake \
                ninja \
                pkgconf \
                build-base \
                clang \
                lld \
                linux-headers

              mkdir -p /workspace/.cache/boost
              if [ ! -d "/workspace/.cache/boost/${BOOST_SRC_DIR}" ]; then
                wget -O "/workspace/.cache/boost/${BOOST_ARCHIVE}" "https://archives.boost.io/release/${BOOST_VERSION}/source/${BOOST_ARCHIVE}"
                tar xf "/workspace/.cache/boost/${BOOST_ARCHIVE}" -C /workspace/.cache/boost
              fi

              if [ "${COMPILER}" = "gcc" ]; then
                CC_BIN=gcc
                CXX_BIN=g++
              else
                CC_BIN=clang
                CXX_BIN=clang++
              fi

              BOOST_ROOT="/workspace/.cache/boost/${BOOST_SRC_DIR}"
              OPENSSL_CACHE_ROOT="/workspace/.cache/openssl/${{ matrix.libc }}-${{ matrix.arch }}"
              OPENSSL_ROOT="${OPENSSL_CACHE_ROOT}/install-${OPENSSL_VERSION}"

              OPENSSL_INSTALL_DIR="${OPENSSL_ROOT}" \
              OPENSSL_CACHE_DIR="${OPENSSL_CACHE_ROOT}" \
              bash ./script/install_openssl_from_source.sh

              cmake -S . -B build -GNinja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_C_COMPILER="${CC_BIN}" \
                -DCMAKE_CXX_COMPILER="${CXX_BIN}" \
                -DENABLE_TSAN=OFF \
                -DENABLE_ASAN=OFF \
                -DBoost_NO_BOOST_CMAKE=ON \
                -DBoost_NO_SYSTEM_PATHS=ON \
                -DBOOST_ROOT="${BOOST_ROOT}" \
                -DOPENSSL_ROOT_DIR="${OPENSSL_ROOT}" \
                -DCMAKE_PREFIX_PATH="${BOOST_ROOT};${OPENSSL_ROOT}"

              cmake --build build --target socks --parallel
              grep -q "SOCKS_HAS_TPROXY=1" build/compile_commands.json
            '

  build-macos:
    name: Build macOS (socks5)
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore macOS Boost Cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/boost
          key: macos-${{ runner.arch }}-boost-${{ env.BOOST_VERSION }}

      - name: Restore macOS OpenSSL Cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/openssl
          key: macos-${{ runner.arch }}-openssl-${{ env.OPENSSL_VERSION }}-${{ hashFiles('script/install_openssl_from_source.sh') }}
          restore-keys: |
            macos-${{ runner.arch }}-openssl-${{ env.OPENSSL_VERSION }}-

      - name: Install Dependencies
        run: |
          set -euo pipefail
          brew update
          brew install cmake ninja llvm wget

      - name: Prepare Boost Headers
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.cache/boost"
          if [ ! -d "$HOME/.cache/boost/${BOOST_SRC_DIR}" ]; then
            wget -O "$HOME/.cache/boost/${BOOST_ARCHIVE}" "https://archives.boost.io/release/${BOOST_VERSION}/source/${BOOST_ARCHIVE}"
            tar xf "$HOME/.cache/boost/${BOOST_ARCHIVE}" -C "$HOME/.cache/boost"
          fi

      - name: Build OpenSSL
        run: |
          set -euo pipefail
          OPENSSL_ROOT="$HOME/.cache/openssl/install-${OPENSSL_VERSION}"
          OPENSSL_INSTALL_DIR="${OPENSSL_ROOT}" \
          OPENSSL_CACHE_DIR="$HOME/.cache/openssl" \
          OPENSSL_CONFIG_TARGET="darwin64-arm64-cc" \
          JOBS="$(sysctl -n hw.ncpu)" \
          bash ./script/install_openssl_from_source.sh

      - name: Configure
        run: |
          set -euo pipefail
          BOOST_ROOT="$HOME/.cache/boost/${BOOST_SRC_DIR}"
          LLVM_ROOT="$(brew --prefix llvm)"
          OPENSSL_ROOT="$HOME/.cache/openssl/install-${OPENSSL_VERSION}"
          cmake -S . -B build -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER="${LLVM_ROOT}/bin/clang" \
            -DCMAKE_CXX_COMPILER="${LLVM_ROOT}/bin/clang++" \
            -DENABLE_TSAN=OFF \
            -DENABLE_ASAN=OFF \
            -DBoost_NO_BOOST_CMAKE=ON \
            -DBoost_NO_SYSTEM_PATHS=ON \
            -DBOOST_ROOT="$BOOST_ROOT" \
            -DOPENSSL_ROOT_DIR="${OPENSSL_ROOT}" \
            -DCMAKE_PREFIX_PATH="$BOOST_ROOT;${OPENSSL_ROOT};${LLVM_ROOT}"

      - name: Build Binary
        run: cmake --build build --target socks --parallel

      - name: Verify macOS Feature Set
        run: |
          set -euo pipefail
          grep -q 'SOCKS_HAS_TPROXY=0' build/compile_commands.json

  build-windows:
    name: Build Windows (socks5)
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore Windows Boost Cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/boost
          key: windows-${{ runner.arch }}-boost-${{ env.BOOST_VERSION }}

      - name: Restore Windows OpenSSL Cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/openssl
          key: windows-${{ runner.arch }}-openssl-${{ env.OPENSSL_VERSION }}-${{ hashFiles('script/install_openssl_from_source.sh') }}
          restore-keys: |
            windows-${{ runner.arch }}-openssl-${{ env.OPENSSL_VERSION }}-

      - name: Setup MSYS2 Toolchain
        uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: UCRT64
          install: >-
            mingw-w64-ucrt-x86_64-clang
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-pkgconf
            make
            perl
            wget
            tar

      - name: Prepare Boost Headers
        shell: msys2 {0}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.cache/boost"
          if [ ! -d "$HOME/.cache/boost/${BOOST_SRC_DIR}" ]; then
            wget -O "$HOME/.cache/boost/${BOOST_ARCHIVE}" "https://archives.boost.io/release/${BOOST_VERSION}/source/${BOOST_ARCHIVE}"
            tar xf "$HOME/.cache/boost/${BOOST_ARCHIVE}" -C "$HOME/.cache/boost"
          fi

      - name: Build OpenSSL
        shell: msys2 {0}
        run: |
          set -euo pipefail
          OPENSSL_ROOT="$HOME/.cache/openssl/install-${OPENSSL_VERSION}"
          OPENSSL_INSTALL_DIR="${OPENSSL_ROOT}" \
          OPENSSL_CACHE_DIR="$HOME/.cache/openssl" \
          OPENSSL_CONFIG_TARGET="mingw64" \
          bash ./script/install_openssl_from_source.sh

      - name: Configure
        shell: msys2 {0}
        run: |
          set -euo pipefail
          BOOST_ROOT="$HOME/.cache/boost/${BOOST_SRC_DIR}"
          OPENSSL_ROOT="$HOME/.cache/openssl/install-${OPENSSL_VERSION}"
          cmake -S . -B build -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DENABLE_TSAN=OFF \
            -DENABLE_ASAN=OFF \
            -DBoost_NO_BOOST_CMAKE=ON \
            -DBoost_NO_SYSTEM_PATHS=ON \
            -DBOOST_ROOT="$BOOST_ROOT" \
            -DOPENSSL_ROOT_DIR="$OPENSSL_ROOT" \
            -DCMAKE_PREFIX_PATH="/ucrt64;$BOOST_ROOT;$OPENSSL_ROOT"

      - name: Build Binary
        shell: msys2 {0}
        run: cmake --build build --target socks --parallel

      - name: Verify Windows Feature Set
        shell: msys2 {0}
        run: |
          set -euo pipefail
          grep -q 'SOCKS_HAS_TPROXY=0' build/compile_commands.json

name: Build Binaries

on:
  push:
    branches:
      - main
      - dev
  pull_request:
  workflow_dispatch:

env:
  BOOST_VERSION: "1.89.0"
  BOOST_ARCHIVE: "boost_1_89_0.tar.bz2"
  BOOST_SRC_DIR: "boost_1_89_0"
  OPENSSL_VERSION: "3.6.0"
  OPENSSL_ARCHIVE: "openssl-3.6.0.tar.gz"
  OPENSSL_SRC_DIR: "openssl-3.6.0"
  OPENSSL_CACHE_REV: "inline-v1"
  CCACHE_CACHE_REV: "v1"
  CCACHE_MAXSIZE: "400M"

jobs:
  build-linux-matrix:
    name: Build Linux (${{ matrix.arch }},${{ matrix.compiler }},${{ matrix.libc }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        arch: [x86, arm64]
        compiler: [gcc, clang]
        libc: [glibc, musl]
        include:
          - arch: x86
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore Linux Boost Cache
        uses: actions/cache@v4
        with:
          path: .cache/boost
          key: linux-boost-${{ env.BOOST_VERSION }}

      - name: Restore Linux OpenSSL Cache
        uses: actions/cache@v4
        with:
          path: .cache/openssl/${{ matrix.libc }}-${{ matrix.arch }}
          key: linux-${{ matrix.arch }}-${{ matrix.libc }}-openssl-${{ env.OPENSSL_VERSION }}-${{ env.OPENSSL_CACHE_REV }}
          restore-keys: |
            linux-${{ matrix.arch }}-${{ matrix.libc }}-openssl-${{ env.OPENSSL_VERSION }}-

      - name: Restore Linux ccache
        uses: actions/cache/restore@v4
        with:
          path: .cache/ccache/linux-${{ matrix.libc }}-${{ matrix.arch }}-${{ matrix.compiler }}
          key: linux-${{ matrix.arch }}-${{ matrix.compiler }}-${{ matrix.libc }}-ccache-${{ env.CCACHE_CACHE_REV }}-${{ github.sha }}
          restore-keys: |
            linux-${{ matrix.arch }}-${{ matrix.compiler }}-${{ matrix.libc }}-ccache-${{ env.CCACHE_CACHE_REV }}-

      - name: Build Linux glibc Matrix Target
        if: ${{ matrix.libc == 'glibc' }}
        run: |
          set -euo pipefail
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e BOOST_VERSION \
            -e BOOST_ARCHIVE \
            -e BOOST_SRC_DIR \
            -e CCACHE_MAXSIZE \
            -e OPENSSL_VERSION \
            -e OPENSSL_ARCHIVE \
            -e OPENSSL_SRC_DIR \
            -e COMPILER="${{ matrix.compiler }}" \
            ubuntu:24.04 bash -lc '
              set -euo pipefail
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y --no-install-recommends \
                ca-certificates \
                bzip2 \
                tar \
                wget \
                perl \
                make \
                cmake \
                ninja-build \
                pkg-config \
                ccache \
                gcc \
                g++ \
                clang

              mkdir -p /workspace/.cache/boost
              if [ ! -d "/workspace/.cache/boost/${BOOST_SRC_DIR}" ]; then
                wget -O "/workspace/.cache/boost/${BOOST_ARCHIVE}" "https://archives.boost.io/release/${BOOST_VERSION}/source/${BOOST_ARCHIVE}"
                tar xf "/workspace/.cache/boost/${BOOST_ARCHIVE}" -C /workspace/.cache/boost
              fi

              if [ "${COMPILER}" = "gcc" ]; then
                CC_BIN=gcc
                CXX_BIN=g++
              else
                CC_BIN=clang
                CXX_BIN=clang++
              fi

              BOOST_ROOT="/workspace/.cache/boost/${BOOST_SRC_DIR}"
              OPENSSL_CACHE_ROOT="/workspace/.cache/openssl/${{ matrix.libc }}-${{ matrix.arch }}"
              OPENSSL_ROOT="${OPENSSL_CACHE_ROOT}/install-${OPENSSL_VERSION}"
              OPENSSL_ARCHIVE_PATH="${OPENSSL_CACHE_ROOT}/${OPENSSL_ARCHIVE}"
              OPENSSL_SOURCE_DIR="${OPENSSL_CACHE_ROOT}/${OPENSSL_SRC_DIR}"
              OPENSSL_CMAKE_DIR="${OPENSSL_ROOT}/lib64/cmake/OpenSSL"
              CCACHE_DIR="/workspace/.cache/ccache/linux-${{ matrix.libc }}-${{ matrix.arch }}-${{ matrix.compiler }}"

              mkdir -p "${OPENSSL_CACHE_ROOT}"
              mkdir -p "${CCACHE_DIR}"
              export CCACHE_DIR
              export CCACHE_BASEDIR=/workspace
              export CCACHE_COMPILERCHECK=content
              export CCACHE_NOHASHDIR=true
              export CCACHE_COMPRESS=1
              ccache -M "${CCACHE_MAXSIZE}"
              ccache -z
              if ! grep -q "OPENSSL_VERSION_STR \"${OPENSSL_VERSION}\"" "${OPENSSL_ROOT}/include/openssl/opensslv.h" 2>/dev/null; then
                if [ ! -f "${OPENSSL_ARCHIVE_PATH}" ]; then
                  wget -O "${OPENSSL_ARCHIVE_PATH}" "https://github.com/openssl/openssl/releases/download/openssl-${OPENSSL_VERSION}/${OPENSSL_ARCHIVE}"
                fi

                rm -rf "${OPENSSL_SOURCE_DIR}" "${OPENSSL_ROOT}"
                tar xf "${OPENSSL_ARCHIVE_PATH}" -C "${OPENSSL_CACHE_ROOT}"
                cd "${OPENSSL_SOURCE_DIR}"
                JOBS="$(getconf _NPROCESSORS_ONLN 2>/dev/null || echo 4)"
                perl ./Configure \
                  --prefix="${OPENSSL_ROOT}" \
                  --openssldir="${OPENSSL_ROOT}/ssl" \
                  shared
                make -j"${JOBS}"
                make install_sw
                grep -q "OPENSSL_VERSION_STR \"${OPENSSL_VERSION}\"" "${OPENSSL_ROOT}/include/openssl/opensslv.h"
                cd /workspace
              fi

              if [ ! -d "${OPENSSL_CMAKE_DIR}" ]; then
                OPENSSL_CMAKE_DIR="${OPENSSL_ROOT}/lib/cmake/OpenSSL"
              fi

              cmake -S . -B build -GNinja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_C_COMPILER="${CC_BIN}" \
                -DCMAKE_CXX_COMPILER="${CXX_BIN}" \
                -DCMAKE_C_COMPILER_LAUNCHER=ccache \
                -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
                -DENABLE_TSAN=OFF \
                -DENABLE_ASAN=OFF \
                -DBoost_NO_BOOST_CMAKE=ON \
                -DBoost_NO_SYSTEM_PATHS=ON \
                -DBOOST_ROOT="${BOOST_ROOT}" \
                -DOpenSSL_DIR="${OPENSSL_CMAKE_DIR}" \
                -DOPENSSL_ROOT_DIR="${OPENSSL_ROOT}" \
                -DCMAKE_PREFIX_PATH="${BOOST_ROOT};${OPENSSL_ROOT}"

              cmake --build build --target socks --parallel
              ccache -s
              grep -q "SOCKS_HAS_TPROXY=1" build/compile_commands.json
            '

      - name: Build Linux musl Matrix Target
        if: ${{ matrix.libc == 'musl' }}
        run: |
          set -euo pipefail
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e BOOST_VERSION \
            -e BOOST_ARCHIVE \
            -e BOOST_SRC_DIR \
            -e CCACHE_MAXSIZE \
            -e OPENSSL_VERSION \
            -e OPENSSL_ARCHIVE \
            -e OPENSSL_SRC_DIR \
            -e COMPILER="${{ matrix.compiler }}" \
            alpine:3.20 sh -lc '
              set -eu
              apk add --no-cache \
                bash \
                ca-certificates \
                bzip2 \
                tar \
                wget \
                perl \
                cmake \
                ninja \
                pkgconf \
                ccache \
                build-base \
                clang \
                lld \
                linux-headers

              mkdir -p /workspace/.cache/boost
              if [ ! -d "/workspace/.cache/boost/${BOOST_SRC_DIR}" ]; then
                wget -O "/workspace/.cache/boost/${BOOST_ARCHIVE}" "https://archives.boost.io/release/${BOOST_VERSION}/source/${BOOST_ARCHIVE}"
                tar xf "/workspace/.cache/boost/${BOOST_ARCHIVE}" -C /workspace/.cache/boost
              fi

              if [ "${COMPILER}" = "gcc" ]; then
                CC_BIN=gcc
                CXX_BIN=g++
              else
                CC_BIN=clang
                CXX_BIN=clang++
              fi

              BOOST_ROOT="/workspace/.cache/boost/${BOOST_SRC_DIR}"
              OPENSSL_CACHE_ROOT="/workspace/.cache/openssl/${{ matrix.libc }}-${{ matrix.arch }}"
              OPENSSL_ROOT="${OPENSSL_CACHE_ROOT}/install-${OPENSSL_VERSION}"
              OPENSSL_ARCHIVE_PATH="${OPENSSL_CACHE_ROOT}/${OPENSSL_ARCHIVE}"
              OPENSSL_SOURCE_DIR="${OPENSSL_CACHE_ROOT}/${OPENSSL_SRC_DIR}"
              OPENSSL_CMAKE_DIR="${OPENSSL_ROOT}/lib64/cmake/OpenSSL"
              CCACHE_DIR="/workspace/.cache/ccache/linux-${{ matrix.libc }}-${{ matrix.arch }}-${{ matrix.compiler }}"

              mkdir -p "${OPENSSL_CACHE_ROOT}"
              mkdir -p "${CCACHE_DIR}"
              export CCACHE_DIR
              export CCACHE_BASEDIR=/workspace
              export CCACHE_COMPILERCHECK=content
              export CCACHE_NOHASHDIR=true
              export CCACHE_COMPRESS=1
              ccache -M "${CCACHE_MAXSIZE}"
              ccache -z
              if ! grep -q "OPENSSL_VERSION_STR \"${OPENSSL_VERSION}\"" "${OPENSSL_ROOT}/include/openssl/opensslv.h" 2>/dev/null; then
                if [ ! -f "${OPENSSL_ARCHIVE_PATH}" ]; then
                  wget -O "${OPENSSL_ARCHIVE_PATH}" "https://github.com/openssl/openssl/releases/download/openssl-${OPENSSL_VERSION}/${OPENSSL_ARCHIVE}"
                fi

                rm -rf "${OPENSSL_SOURCE_DIR}" "${OPENSSL_ROOT}"
                tar xf "${OPENSSL_ARCHIVE_PATH}" -C "${OPENSSL_CACHE_ROOT}"
                cd "${OPENSSL_SOURCE_DIR}"
                JOBS="$(getconf _NPROCESSORS_ONLN 2>/dev/null || echo 4)"
                perl ./Configure \
                  --prefix="${OPENSSL_ROOT}" \
                  --openssldir="${OPENSSL_ROOT}/ssl" \
                  shared
                make -j"${JOBS}"
                make install_sw
                grep -q "OPENSSL_VERSION_STR \"${OPENSSL_VERSION}\"" "${OPENSSL_ROOT}/include/openssl/opensslv.h"
                cd /workspace
              fi

              if [ ! -d "${OPENSSL_CMAKE_DIR}" ]; then
                OPENSSL_CMAKE_DIR="${OPENSSL_ROOT}/lib/cmake/OpenSSL"
              fi

              cmake -S . -B build -GNinja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_C_COMPILER="${CC_BIN}" \
                -DCMAKE_CXX_COMPILER="${CXX_BIN}" \
                -DCMAKE_C_COMPILER_LAUNCHER=ccache \
                -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
                -DENABLE_TSAN=OFF \
                -DENABLE_ASAN=OFF \
                -DBoost_NO_BOOST_CMAKE=ON \
                -DBoost_NO_SYSTEM_PATHS=ON \
                -DBOOST_ROOT="${BOOST_ROOT}" \
                -DOpenSSL_DIR="${OPENSSL_CMAKE_DIR}" \
                -DOPENSSL_ROOT_DIR="${OPENSSL_ROOT}" \
                -DCMAKE_PREFIX_PATH="${BOOST_ROOT};${OPENSSL_ROOT}"

              cmake --build build --target socks --parallel
              ccache -s
              grep -q "SOCKS_HAS_TPROXY=1" build/compile_commands.json
            '

      - name: Save Linux ccache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .cache/ccache/linux-${{ matrix.libc }}-${{ matrix.arch }}-${{ matrix.compiler }}
          key: linux-${{ matrix.arch }}-${{ matrix.compiler }}-${{ matrix.libc }}-ccache-${{ env.CCACHE_CACHE_REV }}-${{ github.sha }}

  build-macos:
    name: Build macOS (socks5)
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore macOS Boost Cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/boost
          key: macos-${{ runner.arch }}-boost-${{ env.BOOST_VERSION }}

      - name: Restore macOS OpenSSL Cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/openssl
          key: macos-${{ runner.arch }}-openssl-${{ env.OPENSSL_VERSION }}-${{ env.OPENSSL_CACHE_REV }}
          restore-keys: |
            macos-${{ runner.arch }}-openssl-${{ env.OPENSSL_VERSION }}-

      - name: Restore macOS ccache
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/ccache/macos-${{ runner.arch }}
          key: macos-${{ runner.arch }}-ccache-${{ env.CCACHE_CACHE_REV }}-${{ github.sha }}
          restore-keys: |
            macos-${{ runner.arch }}-ccache-${{ env.CCACHE_CACHE_REV }}-

      - name: Install Dependencies
        run: |
          set -euo pipefail
          brew update
          brew install ccache cmake ninja llvm wget

      - name: Prepare Boost Headers
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.cache/boost"
          if [ ! -d "$HOME/.cache/boost/${BOOST_SRC_DIR}" ]; then
            wget -O "$HOME/.cache/boost/${BOOST_ARCHIVE}" "https://archives.boost.io/release/${BOOST_VERSION}/source/${BOOST_ARCHIVE}"
            tar xf "$HOME/.cache/boost/${BOOST_ARCHIVE}" -C "$HOME/.cache/boost"
          fi

      - name: Build OpenSSL
        run: |
          set -euo pipefail
          OPENSSL_ROOT="$HOME/.cache/openssl/install-${OPENSSL_VERSION}"
          OPENSSL_CACHE_DIR="$HOME/.cache/openssl"
          OPENSSL_ARCHIVE_PATH="${OPENSSL_CACHE_DIR}/${OPENSSL_ARCHIVE}"
          OPENSSL_SOURCE_DIR="${OPENSSL_CACHE_DIR}/${OPENSSL_SRC_DIR}"
          mkdir -p "${OPENSSL_CACHE_DIR}"
          if ! grep -q "OPENSSL_VERSION_STR \"${OPENSSL_VERSION}\"" "${OPENSSL_ROOT}/include/openssl/opensslv.h" 2>/dev/null; then
            if [ ! -f "${OPENSSL_ARCHIVE_PATH}" ]; then
              wget -O "${OPENSSL_ARCHIVE_PATH}" "https://github.com/openssl/openssl/releases/download/openssl-${OPENSSL_VERSION}/${OPENSSL_ARCHIVE}"
            fi

            rm -rf "${OPENSSL_SOURCE_DIR}" "${OPENSSL_ROOT}"
            tar xf "${OPENSSL_ARCHIVE_PATH}" -C "${OPENSSL_CACHE_DIR}"
            cd "${OPENSSL_SOURCE_DIR}"
            JOBS="$(sysctl -n hw.ncpu)"
            perl ./Configure \
              darwin64-arm64-cc \
              --prefix="${OPENSSL_ROOT}" \
              --openssldir="${OPENSSL_ROOT}/ssl" \
              shared
            make -j"${JOBS}"
            make install_sw
            grep -q "OPENSSL_VERSION_STR \"${OPENSSL_VERSION}\"" "${OPENSSL_ROOT}/include/openssl/opensslv.h"
          fi

      - name: Configure
        run: |
          set -euo pipefail
          BOOST_ROOT="$HOME/.cache/boost/${BOOST_SRC_DIR}"
          LLVM_ROOT="$(brew --prefix llvm)"
          OPENSSL_ROOT="$HOME/.cache/openssl/install-${OPENSSL_VERSION}"
          OPENSSL_CMAKE_DIR="${OPENSSL_ROOT}/lib64/cmake/OpenSSL"
          CCACHE_DIR="$HOME/.cache/ccache/macos-${{ runner.arch }}"
          mkdir -p "${CCACHE_DIR}"
          export CCACHE_DIR
          export CCACHE_BASEDIR="$PWD"
          export CCACHE_COMPILERCHECK=content
          export CCACHE_NOHASHDIR=true
          export CCACHE_COMPRESS=1
          ccache -M "${CCACHE_MAXSIZE}"
          ccache -z
          if [ ! -d "${OPENSSL_CMAKE_DIR}" ]; then
            OPENSSL_CMAKE_DIR="${OPENSSL_ROOT}/lib/cmake/OpenSSL"
          fi
          cmake -S . -B build -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER="${LLVM_ROOT}/bin/clang" \
            -DCMAKE_CXX_COMPILER="${LLVM_ROOT}/bin/clang++" \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DENABLE_TSAN=OFF \
            -DENABLE_ASAN=OFF \
            -DBoost_NO_BOOST_CMAKE=ON \
            -DBoost_NO_SYSTEM_PATHS=ON \
            -DBOOST_ROOT="$BOOST_ROOT" \
            -DOpenSSL_DIR="${OPENSSL_CMAKE_DIR}" \
            -DOPENSSL_ROOT_DIR="${OPENSSL_ROOT}" \
            -DCMAKE_PREFIX_PATH="$BOOST_ROOT;${OPENSSL_ROOT};${LLVM_ROOT}"

      - name: Build Binary
        run: |
          set -euo pipefail
          export CCACHE_DIR="$HOME/.cache/ccache/macos-${{ runner.arch }}"
          export CCACHE_BASEDIR="$PWD"
          export CCACHE_COMPILERCHECK=content
          export CCACHE_NOHASHDIR=true
          export CCACHE_COMPRESS=1
          cmake --build build --target socks --parallel
          ccache -s

      - name: Verify macOS Feature Set
        run: |
          set -euo pipefail
          grep -q 'SOCKS_HAS_TPROXY=0' build/compile_commands.json

      - name: Save macOS ccache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/ccache/macos-${{ runner.arch }}
          key: macos-${{ runner.arch }}-ccache-${{ env.CCACHE_CACHE_REV }}-${{ github.sha }}

  build-windows:
    name: Build Windows (socks5)
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore Windows Boost Cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/boost
          key: windows-${{ runner.arch }}-boost-${{ env.BOOST_VERSION }}

      - name: Restore Windows OpenSSL Cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/openssl
          key: windows-${{ runner.arch }}-openssl-${{ env.OPENSSL_VERSION }}-${{ env.OPENSSL_CACHE_REV }}
          restore-keys: |
            windows-${{ runner.arch }}-openssl-${{ env.OPENSSL_VERSION }}-

      - name: Restore Windows ccache
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/ccache/windows-${{ runner.arch }}-ucrt64-clang
          key: windows-${{ runner.arch }}-ccache-${{ env.CCACHE_CACHE_REV }}-${{ github.sha }}
          restore-keys: |
            windows-${{ runner.arch }}-ccache-${{ env.CCACHE_CACHE_REV }}-

      - name: Setup MSYS2 Toolchain
        uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: UCRT64
          install: >-
            mingw-w64-ucrt-x86_64-ccache
            mingw-w64-ucrt-x86_64-clang
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-pkgconf
            make
            perl
            wget
            tar

      - name: Prepare Boost Headers
        shell: msys2 {0}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.cache/boost"
          if [ ! -d "$HOME/.cache/boost/${BOOST_SRC_DIR}" ]; then
            wget -O "$HOME/.cache/boost/${BOOST_ARCHIVE}" "https://archives.boost.io/release/${BOOST_VERSION}/source/${BOOST_ARCHIVE}"
            tar xf "$HOME/.cache/boost/${BOOST_ARCHIVE}" -C "$HOME/.cache/boost"
          fi

      - name: Build OpenSSL
        shell: msys2 {0}
        run: |
          set -euo pipefail
          OPENSSL_ROOT="$HOME/.cache/openssl/install-${OPENSSL_VERSION}"
          OPENSSL_CACHE_DIR="$HOME/.cache/openssl"
          OPENSSL_ARCHIVE_PATH="${OPENSSL_CACHE_DIR}/${OPENSSL_ARCHIVE}"
          OPENSSL_SOURCE_DIR="${OPENSSL_CACHE_DIR}/${OPENSSL_SRC_DIR}"
          mkdir -p "${OPENSSL_CACHE_DIR}"
          if ! grep -q "OPENSSL_VERSION_STR \"${OPENSSL_VERSION}\"" "${OPENSSL_ROOT}/include/openssl/opensslv.h" 2>/dev/null; then
            if [ ! -f "${OPENSSL_ARCHIVE_PATH}" ]; then
              wget -O "${OPENSSL_ARCHIVE_PATH}" "https://github.com/openssl/openssl/releases/download/openssl-${OPENSSL_VERSION}/${OPENSSL_ARCHIVE}"
            fi

            rm -rf "${OPENSSL_SOURCE_DIR}" "${OPENSSL_ROOT}"
            tar xf "${OPENSSL_ARCHIVE_PATH}" -C "${OPENSSL_CACHE_DIR}"
            cd "${OPENSSL_SOURCE_DIR}"
            JOBS="$(getconf _NPROCESSORS_ONLN 2>/dev/null || echo 4)"
            perl ./Configure \
              mingw64 \
              --prefix="${OPENSSL_ROOT}" \
              --openssldir="${OPENSSL_ROOT}/ssl" \
              shared
            make -j"${JOBS}"
            make install_sw
            grep -q "OPENSSL_VERSION_STR \"${OPENSSL_VERSION}\"" "${OPENSSL_ROOT}/include/openssl/opensslv.h"
          fi

      - name: Configure
        shell: msys2 {0}
        run: |
          set -euo pipefail
          BOOST_ROOT="$HOME/.cache/boost/${BOOST_SRC_DIR}"
          OPENSSL_ROOT="$HOME/.cache/openssl/install-${OPENSSL_VERSION}"
          OPENSSL_CMAKE_DIR="${OPENSSL_ROOT}/lib64/cmake/OpenSSL"
          CCACHE_DIR="$HOME/.cache/ccache/windows-${{ runner.arch }}-ucrt64-clang"
          mkdir -p "${CCACHE_DIR}"
          export CCACHE_DIR
          export CCACHE_BASEDIR="$PWD"
          export CCACHE_COMPILERCHECK=content
          export CCACHE_NOHASHDIR=true
          export CCACHE_COMPRESS=1
          ccache -M "${CCACHE_MAXSIZE}"
          ccache -z
          if [ ! -d "${OPENSSL_CMAKE_DIR}" ]; then
            OPENSSL_CMAKE_DIR="${OPENSSL_ROOT}/lib/cmake/OpenSSL"
          fi
          cmake -S . -B build -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DENABLE_TSAN=OFF \
            -DENABLE_ASAN=OFF \
            -DBoost_NO_BOOST_CMAKE=ON \
            -DBoost_NO_SYSTEM_PATHS=ON \
            -DBOOST_ROOT="$BOOST_ROOT" \
            -DOpenSSL_DIR="${OPENSSL_CMAKE_DIR}" \
            -DOPENSSL_ROOT_DIR="$OPENSSL_ROOT" \
            -DCMAKE_PREFIX_PATH="/ucrt64;$BOOST_ROOT;$OPENSSL_ROOT"

      - name: Build Binary
        shell: msys2 {0}
        run: |
          set -euo pipefail
          export CCACHE_DIR="$HOME/.cache/ccache/windows-${{ runner.arch }}-ucrt64-clang"
          export CCACHE_BASEDIR="$PWD"
          export CCACHE_COMPILERCHECK=content
          export CCACHE_NOHASHDIR=true
          export CCACHE_COMPRESS=1
          cmake --build build --target socks --parallel
          ccache -s

      - name: Verify Windows Feature Set
        shell: msys2 {0}
        run: |
          set -euo pipefail
          grep -q 'SOCKS_HAS_TPROXY=0' build/compile_commands.json

      - name: Save Windows ccache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/ccache/windows-${{ runner.arch }}-ucrt64-clang
          key: windows-${{ runner.arch }}-ccache-${{ env.CCACHE_CACHE_REV }}-${{ github.sha }}

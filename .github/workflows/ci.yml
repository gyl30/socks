name: Build Binaries

on:
  push:
    branches:
      - main
      - dev
  pull_request:
  workflow_dispatch:

env:
  BOOST_VERSION: "1.89.0"
  BOOST_ARCHIVE: "boost_1_89_0.tar.bz2"
  BOOST_SRC_DIR: "boost_1_89_0"
  BROTLI_VERSION: "1.1.0"
  BROTLI_ARCHIVE: "brotli-1.1.0.tar.gz"
  BROTLI_SRC_DIR: "brotli-1.1.0"
  OPENSSL_VERSION: "3.6.0"
  OPENSSL_ARCHIVE: "openssl-3.6.0.tar.gz"
  OPENSSL_SRC_DIR: "openssl-3.6.0"
  OPENSSL_CACHE_REV: "inline-v1"
  CCACHE_CACHE_REV: "v1"
  CCACHE_MAXSIZE: "400M"

jobs:
  build-linux-matrix:
    name: Build Linux (${{ matrix.arch }},${{ matrix.compiler }},${{ matrix.libc }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        arch: [x86, arm64]
        compiler: [gcc, clang]
        libc: [glibc, musl]
        include:
          - arch: x86
            runner: ubuntu-22.04
          - arch: arm64
            runner: ubuntu-22.04-arm

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Restore Linux Boost Cache
        uses: actions/cache@v5
        with:
          path: .cache/boost
          key: linux-boost-${{ env.BOOST_VERSION }}

      - name: Restore Linux OpenSSL Cache
        uses: actions/cache@v5
        with:
          path: .cache/openssl/${{ matrix.libc }}-${{ matrix.arch }}
          key: linux-${{ matrix.arch }}-${{ matrix.libc }}-openssl-${{ env.OPENSSL_VERSION }}-${{ env.OPENSSL_CACHE_REV }}
          restore-keys: |
            linux-${{ matrix.arch }}-${{ matrix.libc }}-openssl-${{ env.OPENSSL_VERSION }}-

      - name: Restore Linux ccache
        uses: actions/cache/restore@v5
        with:
          path: .cache/ccache/linux-${{ matrix.libc }}-${{ matrix.arch }}-${{ matrix.compiler }}
          key: linux-${{ matrix.arch }}-${{ matrix.compiler }}-${{ matrix.libc }}-ccache-${{ env.CCACHE_CACHE_REV }}-${{ github.sha }}
          restore-keys: |
            linux-${{ matrix.arch }}-${{ matrix.compiler }}-${{ matrix.libc }}-ccache-${{ env.CCACHE_CACHE_REV }}-

      - name: Build Linux glibc Matrix Target
        if: ${{ matrix.libc == 'glibc' }}
        run: |
          set -euo pipefail
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e BOOST_VERSION \
            -e BOOST_ARCHIVE \
            -e BOOST_SRC_DIR \
            -e BROTLI_VERSION \
            -e BROTLI_ARCHIVE \
            -e BROTLI_SRC_DIR \
            -e CCACHE_MAXSIZE \
            -e OPENSSL_VERSION \
            -e OPENSSL_ARCHIVE \
            -e OPENSSL_SRC_DIR \
            -e CI_BASE_SHA="${{ github.event.pull_request.base.sha || github.event.before }}" \
            -e COMPILER="${{ matrix.compiler }}" \
            ubuntu:24.04 bash -lc '
              set -euo pipefail
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y --no-install-recommends \
                ca-certificates \
                bzip2 \
                tar \
                wget \
                gnupg \
                perl \
                make \
                cmake \
                ninja-build \
                pkg-config \
                ccache \
                clang-format \
                gcc \
                g++ \
                libbrotli-dev \
                clang \
                clang-tidy \
                clang-tools \
                libclang-rt-18-dev \
                git \
                python3

              mkdir -p /usr/share/keyrings
              wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | gpg --dearmor > /usr/share/keyrings/llvm-archive-keyring.gpg
              echo "deb [signed-by=/usr/share/keyrings/llvm-archive-keyring.gpg] http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" >/etc/apt/sources.list.d/llvm.list
              apt-get update
              apt-get install -y --no-install-recommends clang-tidy-22

              mkdir -p /workspace/.cache/boost
              if [ ! -d "/workspace/.cache/boost/${BOOST_SRC_DIR}" ]; then
                wget -O "/workspace/.cache/boost/${BOOST_ARCHIVE}" "https://archives.boost.io/release/${BOOST_VERSION}/source/${BOOST_ARCHIVE}"
                tar xf "/workspace/.cache/boost/${BOOST_ARCHIVE}" -C /workspace/.cache/boost
              fi

              if [ "${COMPILER}" = "gcc" ]; then
                CC_BIN=gcc
                CXX_BIN=g++
              else
                CC_BIN=clang
                CXX_BIN=clang++
              fi

              BOOST_ROOT="/workspace/.cache/boost/${BOOST_SRC_DIR}"
              OPENSSL_CACHE_ROOT="/workspace/.cache/openssl/${{ matrix.libc }}-${{ matrix.arch }}"
              OPENSSL_ROOT="${OPENSSL_CACHE_ROOT}/install-${OPENSSL_VERSION}"
              OPENSSL_ARCHIVE_PATH="${OPENSSL_CACHE_ROOT}/${OPENSSL_ARCHIVE}"
              OPENSSL_SOURCE_DIR="${OPENSSL_CACHE_ROOT}/${OPENSSL_SRC_DIR}"
              OPENSSL_CMAKE_DIR="${OPENSSL_ROOT}/lib64/cmake/OpenSSL"
              CCACHE_DIR="/workspace/.cache/ccache/linux-${{ matrix.libc }}-${{ matrix.arch }}-${{ matrix.compiler }}"

              mkdir -p "${OPENSSL_CACHE_ROOT}"
              mkdir -p "${CCACHE_DIR}"
              export CCACHE_DIR
              export CCACHE_BASEDIR=/workspace
              export CCACHE_COMPILERCHECK=content
              export CCACHE_NOHASHDIR=true
              export CCACHE_COMPRESS=1
              ccache -M "${CCACHE_MAXSIZE}"
              ccache -z
              if ! grep -q "OPENSSL_VERSION_STR \"${OPENSSL_VERSION}\"" "${OPENSSL_ROOT}/include/openssl/opensslv.h" 2>/dev/null; then
                if [ ! -f "${OPENSSL_ARCHIVE_PATH}" ]; then
                  wget -O "${OPENSSL_ARCHIVE_PATH}" "https://github.com/openssl/openssl/releases/download/openssl-${OPENSSL_VERSION}/${OPENSSL_ARCHIVE}"
                fi

                rm -rf "${OPENSSL_SOURCE_DIR}" "${OPENSSL_ROOT}"
                tar xf "${OPENSSL_ARCHIVE_PATH}" -C "${OPENSSL_CACHE_ROOT}"
                cd "${OPENSSL_SOURCE_DIR}"
                JOBS="$(getconf _NPROCESSORS_ONLN 2>/dev/null || echo 4)"
                perl ./Configure \
                  --prefix="${OPENSSL_ROOT}" \
                  --openssldir="${OPENSSL_ROOT}/ssl" \
                  shared
                make -j"${JOBS}"
                make install_sw
                grep -q "OPENSSL_VERSION_STR \"${OPENSSL_VERSION}\"" "${OPENSSL_ROOT}/include/openssl/opensslv.h"
                cd /workspace
              fi

              if [ ! -d "${OPENSSL_CMAKE_DIR}" ]; then
                OPENSSL_CMAKE_DIR="${OPENSSL_ROOT}/lib/cmake/OpenSSL"
              fi

              cmake -S . -B build -GNinja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_C_COMPILER="${CC_BIN}" \
                -DCMAKE_CXX_COMPILER="${CXX_BIN}" \
                -DCMAKE_C_COMPILER_LAUNCHER=ccache \
                -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
                -DENABLE_TSAN=OFF \
                -DENABLE_ASAN=OFF \
                -DBoost_NO_BOOST_CMAKE=ON \
                -DBoost_NO_SYSTEM_PATHS=ON \
                -DBOOST_ROOT="${BOOST_ROOT}" \
                -DOpenSSL_DIR="${OPENSSL_CMAKE_DIR}" \
                -DOPENSSL_ROOT_DIR="${OPENSSL_ROOT}" \
                -DCMAKE_PREFIX_PATH="${BOOST_ROOT};${OPENSSL_ROOT}"

              cmake --build build --target socks --parallel
              ccache -s
              grep -q "SOCKS_HAS_TPROXY=1" build/compile_commands.json

              if [ "${COMPILER}" = "clang" ] && [ "${{ matrix.arch }}" = "x86" ]; then
                python3 scripts/ci_lint.py

                cmake -S . -B build-fuzz -GNinja \
                  -DCMAKE_BUILD_TYPE=Release \
                  -DCMAKE_C_COMPILER="${CC_BIN}" \
                  -DCMAKE_CXX_COMPILER="${CXX_BIN}" \
                  -DCMAKE_C_COMPILER_LAUNCHER=ccache \
                  -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
                  -DENABLE_FUZZ=ON \
                  -DENABLE_TSAN=OFF \
                  -DENABLE_ASAN=OFF \
                  -DBoost_NO_BOOST_CMAKE=ON \
                  -DBoost_NO_SYSTEM_PATHS=ON \
                  -DBOOST_ROOT="${BOOST_ROOT}" \
                  -DOpenSSL_DIR="${OPENSSL_CMAKE_DIR}" \
                  -DOPENSSL_ROOT_DIR="${OPENSSL_ROOT}" \
                  -DCMAKE_PREFIX_PATH="${BOOST_ROOT};${OPENSSL_ROOT}"

                cmake --build build-fuzz --target ch_parser_fuzz mux_codec_fuzz --parallel

                SYMBOLIZER_BIN="$(command -v llvm-symbolizer || command -v llvm-symbolizer-18 || command -v llvm-symbolizer-22 || true)"
                if [ -z "${SYMBOLIZER_BIN}" ]; then
                  apt-get update
                  apt-get install -y --no-install-recommends llvm
                  SYMBOLIZER_BIN="$(command -v llvm-symbolizer || command -v llvm-symbolizer-18 || command -v llvm-symbolizer-22 || true)"
                fi
                if [ -z "${SYMBOLIZER_BIN}" ]; then
                  echo "llvm symbolizer not found" >&2
                  exit 1
                fi
                export ASAN_SYMBOLIZER_PATH="${SYMBOLIZER_BIN}"
                export UBSAN_SYMBOLIZER_PATH="${SYMBOLIZER_BIN}"

                ./build-fuzz/ch_parser_fuzz -runs=1000 -timeout=5 -rss_limit_mb=2048 -dict=fuzz/ch_parser.dict fuzz/corpus/ch_parser
                ./build-fuzz/mux_codec_fuzz -runs=1000 -timeout=5 -rss_limit_mb=2048 -dict=fuzz/mux_codec.dict fuzz/corpus/mux_codec
                ccache -s
              fi
            '

      - name: Build Linux musl Matrix Target
        if: ${{ matrix.libc == 'musl' }}
        run: |
          set -euo pipefail
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e BOOST_VERSION \
            -e BOOST_ARCHIVE \
            -e BOOST_SRC_DIR \
            -e BROTLI_VERSION \
            -e BROTLI_ARCHIVE \
            -e BROTLI_SRC_DIR \
            -e CCACHE_MAXSIZE \
            -e OPENSSL_VERSION \
            -e OPENSSL_ARCHIVE \
            -e OPENSSL_SRC_DIR \
            -e COMPILER="${{ matrix.compiler }}" \
            alpine:3.20 sh -lc '
              set -eu
              apk add --no-cache \
                bash \
                binutils \
                ca-certificates \
                bzip2 \
                tar \
                wget \
                perl \
                cmake \
                ninja \
                pkgconf \
                ccache \
                build-base \
                clang \
                lld \
                linux-headers

              mkdir -p /workspace/.cache/boost
              if [ ! -d "/workspace/.cache/boost/${BOOST_SRC_DIR}" ]; then
                wget -O "/workspace/.cache/boost/${BOOST_ARCHIVE}" "https://archives.boost.io/release/${BOOST_VERSION}/source/${BOOST_ARCHIVE}"
                tar xf "/workspace/.cache/boost/${BOOST_ARCHIVE}" -C /workspace/.cache/boost
              fi

              if [ "${COMPILER}" = "gcc" ]; then
                CC_BIN=gcc
                CXX_BIN=g++
              else
                CC_BIN=clang
                CXX_BIN=clang++
              fi

              BOOST_ROOT="/workspace/.cache/boost/${BOOST_SRC_DIR}"
              BROTLI_CACHE_ROOT="/workspace/.cache/brotli/${{ matrix.libc }}-${{ matrix.arch }}-${{ matrix.compiler }}"
              BROTLI_ROOT="${BROTLI_CACHE_ROOT}/install-${BROTLI_VERSION}"
              BROTLI_ARCHIVE_PATH="${BROTLI_CACHE_ROOT}/${BROTLI_ARCHIVE}"
              BROTLI_SOURCE_DIR="${BROTLI_CACHE_ROOT}/${BROTLI_SRC_DIR}"
              OPENSSL_CACHE_ROOT="/workspace/.cache/openssl/${{ matrix.libc }}-${{ matrix.arch }}"
              OPENSSL_ROOT="${OPENSSL_CACHE_ROOT}/install-${OPENSSL_VERSION}"
              OPENSSL_ARCHIVE_PATH="${OPENSSL_CACHE_ROOT}/${OPENSSL_ARCHIVE}"
              OPENSSL_SOURCE_DIR="${OPENSSL_CACHE_ROOT}/${OPENSSL_SRC_DIR}"
              OPENSSL_CMAKE_DIR="${OPENSSL_ROOT}/lib64/cmake/OpenSSL"
              CCACHE_DIR="/workspace/.cache/ccache/linux-${{ matrix.libc }}-${{ matrix.arch }}-${{ matrix.compiler }}"

              mkdir -p "${BROTLI_CACHE_ROOT}"
              mkdir -p "${OPENSSL_CACHE_ROOT}"
              mkdir -p "${CCACHE_DIR}"
              export CCACHE_DIR
              export CCACHE_BASEDIR=/workspace
              export CCACHE_COMPILERCHECK=content
              export CCACHE_NOHASHDIR=true
              export CCACHE_COMPRESS=1
              ccache -M "${CCACHE_MAXSIZE}"
              ccache -z
              if [ ! -f "${BROTLI_ROOT}/lib/libbrotlidec.a" ] || [ ! -f "${BROTLI_ROOT}/lib/libbrotlicommon.a" ]; then
                if [ ! -f "${BROTLI_ARCHIVE_PATH}" ]; then
                  wget -O "${BROTLI_ARCHIVE_PATH}" "https://github.com/google/brotli/archive/refs/tags/v${BROTLI_VERSION}.tar.gz"
                fi

                rm -rf "${BROTLI_SOURCE_DIR}" "${BROTLI_ROOT}"
                tar xf "${BROTLI_ARCHIVE_PATH}" -C "${BROTLI_CACHE_ROOT}"
                cmake -S "${BROTLI_SOURCE_DIR}" -B "${BROTLI_SOURCE_DIR}/build" -GNinja \
                  -DCMAKE_BUILD_TYPE=Release \
                  -DCMAKE_C_COMPILER="${CC_BIN}" \
                  -DCMAKE_CXX_COMPILER="${CXX_BIN}" \
                  -DCMAKE_INSTALL_PREFIX="${BROTLI_ROOT}" \
                  -DCMAKE_INSTALL_LIBDIR=lib \
                  -DBUILD_TESTING=OFF \
                  -DBROTLI_DISABLE_TESTS=ON \
                  -DBUILD_SHARED_LIBS=OFF
                cmake --build "${BROTLI_SOURCE_DIR}/build" --target install --parallel
              fi
              if ! grep -q "OPENSSL_VERSION_STR \"${OPENSSL_VERSION}\"" "${OPENSSL_ROOT}/include/openssl/opensslv.h" 2>/dev/null || { [ ! -f "${OPENSSL_ROOT}/lib/libssl.a" ] && [ ! -f "${OPENSSL_ROOT}/lib64/libssl.a" ]; } || { [ ! -f "${OPENSSL_ROOT}/lib/libcrypto.a" ] && [ ! -f "${OPENSSL_ROOT}/lib64/libcrypto.a" ]; }; then
                if [ ! -f "${OPENSSL_ARCHIVE_PATH}" ]; then
                  wget -O "${OPENSSL_ARCHIVE_PATH}" "https://github.com/openssl/openssl/releases/download/openssl-${OPENSSL_VERSION}/${OPENSSL_ARCHIVE}"
                fi

                rm -rf "${OPENSSL_SOURCE_DIR}" "${OPENSSL_ROOT}"
                tar xf "${OPENSSL_ARCHIVE_PATH}" -C "${OPENSSL_CACHE_ROOT}"
                cd "${OPENSSL_SOURCE_DIR}"
                JOBS="$(getconf _NPROCESSORS_ONLN 2>/dev/null || echo 4)"
                perl ./Configure \
                  --prefix="${OPENSSL_ROOT}" \
                  --openssldir="${OPENSSL_ROOT}/ssl" \
                  no-shared \
                  no-module
                make -j"${JOBS}"
                make install_sw
                grep -q "OPENSSL_VERSION_STR \"${OPENSSL_VERSION}\"" "${OPENSSL_ROOT}/include/openssl/opensslv.h"
                cd /workspace
              fi

              if [ ! -d "${OPENSSL_CMAKE_DIR}" ]; then
                OPENSSL_CMAKE_DIR="${OPENSSL_ROOT}/lib/cmake/OpenSSL"
              fi

              cmake -S . -B build -GNinja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_C_COMPILER="${CC_BIN}" \
                -DCMAKE_CXX_COMPILER="${CXX_BIN}" \
                -DCMAKE_C_COMPILER_LAUNCHER=ccache \
                -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
                -DENABLE_TSAN=OFF \
                -DENABLE_ASAN=OFF \
                -DENABLE_STATIC_LINK=ON \
                -DBoost_NO_BOOST_CMAKE=ON \
                -DBoost_NO_SYSTEM_PATHS=ON \
                -DBOOST_ROOT="${BOOST_ROOT}" \
                -DBROTLIDEC_LIBRARY="${BROTLI_ROOT}/lib/libbrotlidec.a" \
                -DBROTLICOMMON_LIBRARY="${BROTLI_ROOT}/lib/libbrotlicommon.a" \
                -DBROTLI_INCLUDE_DIR="${BROTLI_ROOT}/include" \
                -DOpenSSL_DIR="${OPENSSL_CMAKE_DIR}" \
                -DOPENSSL_ROOT_DIR="${OPENSSL_ROOT}" \
                -DCMAKE_PREFIX_PATH="${BOOST_ROOT};${OPENSSL_ROOT}"

              cmake --build build --target socks --parallel
              ccache -s
              grep -q "SOCKS_HAS_TPROXY=1" build/compile_commands.json
              if readelf -l build/socks | grep -q "INTERP"; then
                echo "musl build produced a dynamically linked binary" >&2
                exit 1
              fi
              if readelf -d build/socks 2>/dev/null | grep -q "(NEEDED)"; then
                echo "musl build still has shared library dependencies" >&2
                exit 1
              fi
            '

      - name: Save Linux ccache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: .cache/ccache/linux-${{ matrix.libc }}-${{ matrix.arch }}-${{ matrix.compiler }}
          key: linux-${{ matrix.arch }}-${{ matrix.compiler }}-${{ matrix.libc }}-ccache-${{ env.CCACHE_CACHE_REV }}-${{ github.sha }}

  build-macos:
    name: Build macOS (socks5)
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Restore macOS Boost Cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/boost
          key: macos-${{ runner.arch }}-boost-${{ env.BOOST_VERSION }}

      - name: Restore macOS OpenSSL Cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/openssl
          key: macos-${{ runner.arch }}-openssl-${{ env.OPENSSL_VERSION }}-${{ env.OPENSSL_CACHE_REV }}
          restore-keys: |
            macos-${{ runner.arch }}-openssl-${{ env.OPENSSL_VERSION }}-

      - name: Restore macOS ccache
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/ccache/macos-${{ runner.arch }}
          key: macos-${{ runner.arch }}-ccache-${{ env.CCACHE_CACHE_REV }}-${{ github.sha }}
          restore-keys: |
            macos-${{ runner.arch }}-ccache-${{ env.CCACHE_CACHE_REV }}-

      - name: Install Dependencies
        run: |
          set -euo pipefail
          brew update
          brew install brotli ccache cmake ninja llvm wget

      - name: Prepare Boost Headers
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.cache/boost"
          if [ ! -d "$HOME/.cache/boost/${BOOST_SRC_DIR}" ]; then
            wget -O "$HOME/.cache/boost/${BOOST_ARCHIVE}" "https://archives.boost.io/release/${BOOST_VERSION}/source/${BOOST_ARCHIVE}"
            tar xf "$HOME/.cache/boost/${BOOST_ARCHIVE}" -C "$HOME/.cache/boost"
          fi

      - name: Build OpenSSL
        run: |
          set -euo pipefail
          OPENSSL_ROOT="$HOME/.cache/openssl/install-${OPENSSL_VERSION}"
          OPENSSL_CACHE_DIR="$HOME/.cache/openssl"
          OPENSSL_ARCHIVE_PATH="${OPENSSL_CACHE_DIR}/${OPENSSL_ARCHIVE}"
          OPENSSL_SOURCE_DIR="${OPENSSL_CACHE_DIR}/${OPENSSL_SRC_DIR}"
          mkdir -p "${OPENSSL_CACHE_DIR}"
          if ! grep -q "OPENSSL_VERSION_STR \"${OPENSSL_VERSION}\"" "${OPENSSL_ROOT}/include/openssl/opensslv.h" 2>/dev/null; then
            if [ ! -f "${OPENSSL_ARCHIVE_PATH}" ]; then
              wget -O "${OPENSSL_ARCHIVE_PATH}" "https://github.com/openssl/openssl/releases/download/openssl-${OPENSSL_VERSION}/${OPENSSL_ARCHIVE}"
            fi

            rm -rf "${OPENSSL_SOURCE_DIR}" "${OPENSSL_ROOT}"
            tar xf "${OPENSSL_ARCHIVE_PATH}" -C "${OPENSSL_CACHE_DIR}"
            cd "${OPENSSL_SOURCE_DIR}"
            JOBS="$(sysctl -n hw.ncpu)"
            perl ./Configure \
              darwin64-arm64-cc \
              --prefix="${OPENSSL_ROOT}" \
              --openssldir="${OPENSSL_ROOT}/ssl" \
              shared
            make -j"${JOBS}"
            make install_sw
            grep -q "OPENSSL_VERSION_STR \"${OPENSSL_VERSION}\"" "${OPENSSL_ROOT}/include/openssl/opensslv.h"
          fi

      - name: Configure
        run: |
          set -euo pipefail
          BOOST_ROOT="$HOME/.cache/boost/${BOOST_SRC_DIR}"
          LLVM_ROOT="$(brew --prefix llvm)"
          OPENSSL_ROOT="$HOME/.cache/openssl/install-${OPENSSL_VERSION}"
          OPENSSL_CMAKE_DIR="${OPENSSL_ROOT}/lib64/cmake/OpenSSL"
          CCACHE_DIR="$HOME/.cache/ccache/macos-${{ runner.arch }}"
          mkdir -p "${CCACHE_DIR}"
          export CCACHE_DIR
          export CCACHE_BASEDIR="$PWD"
          export CCACHE_COMPILERCHECK=content
          export CCACHE_NOHASHDIR=true
          export CCACHE_COMPRESS=1
          ccache -M "${CCACHE_MAXSIZE}"
          ccache -z
          if [ ! -d "${OPENSSL_CMAKE_DIR}" ]; then
            OPENSSL_CMAKE_DIR="${OPENSSL_ROOT}/lib/cmake/OpenSSL"
          fi
          cmake -S . -B build -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER="${LLVM_ROOT}/bin/clang" \
            -DCMAKE_CXX_COMPILER="${LLVM_ROOT}/bin/clang++" \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DENABLE_TSAN=OFF \
            -DENABLE_ASAN=OFF \
            -DBoost_NO_BOOST_CMAKE=ON \
            -DBoost_NO_SYSTEM_PATHS=ON \
            -DBOOST_ROOT="$BOOST_ROOT" \
            -DOpenSSL_DIR="${OPENSSL_CMAKE_DIR}" \
            -DOPENSSL_ROOT_DIR="${OPENSSL_ROOT}" \
            -DCMAKE_PREFIX_PATH="$BOOST_ROOT;${OPENSSL_ROOT};${LLVM_ROOT}"

      - name: Build Binary
        run: |
          set -euo pipefail
          export CCACHE_DIR="$HOME/.cache/ccache/macos-${{ runner.arch }}"
          export CCACHE_BASEDIR="$PWD"
          export CCACHE_COMPILERCHECK=content
          export CCACHE_NOHASHDIR=true
          export CCACHE_COMPRESS=1
          cmake --build build --target socks --parallel
          ccache -s

      - name: Verify macOS Feature Set
        run: |
          set -euo pipefail
          grep -q 'SOCKS_HAS_TPROXY=0' build/compile_commands.json

      - name: Save macOS ccache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: ~/.cache/ccache/macos-${{ runner.arch }}
          key: macos-${{ runner.arch }}-ccache-${{ env.CCACHE_CACHE_REV }}-${{ github.sha }}

  build-windows:
    name: Build Windows (socks5)
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Restore Windows Boost Cache
        uses: actions/cache@v5
        with:
          path: .cache/boost
          key: windows-${{ runner.arch }}-boost-${{ env.BOOST_VERSION }}

      - name: Restore Windows OpenSSL Cache
        uses: actions/cache@v5
        with:
          path: .cache/openssl
          key: windows-${{ runner.arch }}-openssl-${{ env.OPENSSL_VERSION }}-${{ env.OPENSSL_CACHE_REV }}
          restore-keys: |
            windows-${{ runner.arch }}-openssl-${{ env.OPENSSL_VERSION }}-

      - name: Restore Windows ccache
        uses: actions/cache/restore@v5
        with:
          path: .cache/ccache/windows-${{ runner.arch }}-ucrt64-clang
          key: windows-${{ runner.arch }}-ccache-${{ env.CCACHE_CACHE_REV }}-${{ github.sha }}
          restore-keys: |
            windows-${{ runner.arch }}-ccache-${{ env.CCACHE_CACHE_REV }}-

      - name: Setup MSYS2 Toolchain
        uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: UCRT64
          install: >-
            mingw-w64-ucrt-x86_64-ccache
            mingw-w64-ucrt-x86_64-clang
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-brotli
            make
            perl
            wget
            tar

      - name: Prepare Boost Headers
        shell: msys2 {0}
        run: |
          set -euo pipefail
          CACHE_ROOT="$PWD/.cache"
          BOOST_CACHE_DIR="${CACHE_ROOT}/boost"
          mkdir -p "${BOOST_CACHE_DIR}"
          if [ ! -d "${BOOST_CACHE_DIR}/${BOOST_SRC_DIR}" ]; then
            wget -O "${BOOST_CACHE_DIR}/${BOOST_ARCHIVE}" "https://archives.boost.io/release/${BOOST_VERSION}/source/${BOOST_ARCHIVE}"
            tar xf "${BOOST_CACHE_DIR}/${BOOST_ARCHIVE}" -C "${BOOST_CACHE_DIR}"
          fi

      - name: Build OpenSSL
        shell: msys2 {0}
        run: |
          set -euo pipefail
          CACHE_ROOT="$PWD/.cache"
          OPENSSL_CACHE_DIR="${CACHE_ROOT}/openssl"
          OPENSSL_ROOT="${OPENSSL_CACHE_DIR}/install-${OPENSSL_VERSION}"
          OPENSSL_ARCHIVE_PATH="${OPENSSL_CACHE_DIR}/${OPENSSL_ARCHIVE}"
          OPENSSL_SOURCE_DIR="${OPENSSL_CACHE_DIR}/${OPENSSL_SRC_DIR}"
          mkdir -p "${OPENSSL_CACHE_DIR}"
          if ! grep -q "OPENSSL_VERSION_STR \"${OPENSSL_VERSION}\"" "${OPENSSL_ROOT}/include/openssl/opensslv.h" 2>/dev/null; then
            if [ ! -f "${OPENSSL_ARCHIVE_PATH}" ]; then
              wget -O "${OPENSSL_ARCHIVE_PATH}" "https://github.com/openssl/openssl/releases/download/openssl-${OPENSSL_VERSION}/${OPENSSL_ARCHIVE}"
            fi

            rm -rf "${OPENSSL_SOURCE_DIR}" "${OPENSSL_ROOT}"
            tar xf "${OPENSSL_ARCHIVE_PATH}" -C "${OPENSSL_CACHE_DIR}"
            cd "${OPENSSL_SOURCE_DIR}"
            JOBS="$(getconf _NPROCESSORS_ONLN 2>/dev/null || echo 4)"
            perl ./Configure \
              mingw64 \
              --prefix="${OPENSSL_ROOT}" \
              --openssldir="${OPENSSL_ROOT}/ssl" \
              shared
            make -j"${JOBS}"
            make install_sw
            grep -q "OPENSSL_VERSION_STR \"${OPENSSL_VERSION}\"" "${OPENSSL_ROOT}/include/openssl/opensslv.h"
          fi

      - name: Configure
        shell: msys2 {0}
        run: |
          set -euo pipefail
          CACHE_ROOT="$PWD/.cache"
          BOOST_ROOT="${CACHE_ROOT}/boost/${BOOST_SRC_DIR}"
          OPENSSL_ROOT="${CACHE_ROOT}/openssl/install-${OPENSSL_VERSION}"
          OPENSSL_CMAKE_DIR="${OPENSSL_ROOT}/lib64/cmake/OpenSSL"
          CCACHE_DIR="$PWD/.cache/ccache/windows-${{ runner.arch }}-ucrt64-clang"
          mkdir -p "${CCACHE_DIR}"
          export CCACHE_DIR
          export CCACHE_BASEDIR="$PWD"
          export CCACHE_COMPILERCHECK=content
          export CCACHE_NOHASHDIR=true
          export CCACHE_COMPRESS=1
          ccache -M "${CCACHE_MAXSIZE}"
          ccache -z
          if [ ! -d "${OPENSSL_CMAKE_DIR}" ]; then
            OPENSSL_CMAKE_DIR="${OPENSSL_ROOT}/lib/cmake/OpenSSL"
          fi
          cmake -S . -B build -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DENABLE_TSAN=OFF \
            -DENABLE_ASAN=OFF \
            -DBoost_NO_BOOST_CMAKE=ON \
            -DBoost_NO_SYSTEM_PATHS=ON \
            -DBOOST_ROOT="$BOOST_ROOT" \
            -DOpenSSL_DIR="${OPENSSL_CMAKE_DIR}" \
            -DOPENSSL_ROOT_DIR="$OPENSSL_ROOT" \
            -DCMAKE_PREFIX_PATH="/ucrt64;$BOOST_ROOT;$OPENSSL_ROOT"

      - name: Build Binary
        shell: msys2 {0}
        run: |
          set -euo pipefail
          export CCACHE_DIR="$PWD/.cache/ccache/windows-${{ runner.arch }}-ucrt64-clang"
          export CCACHE_BASEDIR="$PWD"
          export CCACHE_COMPILERCHECK=content
          export CCACHE_NOHASHDIR=true
          export CCACHE_COMPRESS=1
          cmake --build build --target socks --parallel
          ccache -s

      - name: Verify Windows Feature Set
        shell: msys2 {0}
        run: |
          set -euo pipefail
          grep -q 'SOCKS_HAS_TPROXY=0' build/compile_commands.json

      - name: Save Windows ccache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: .cache/ccache/windows-${{ runner.arch }}-ucrt64-clang
          key: windows-${{ runner.arch }}-ccache-${{ env.CCACHE_CACHE_REV }}-${{ github.sha }}
